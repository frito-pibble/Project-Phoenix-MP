name: CI Tests

on:
  push:
    branches: [main, mvp, beta*, feature/*]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, beta*]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run shared module unit tests
        run: ./gradlew :shared:testAndroidHostTest --continue -Pskip.supabase.check=true

      - name: Run androidApp unit tests
        run: ./gradlew :androidApp:testDebugUnitTest --continue -Pskip.supabase.check=true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            shared/build/reports/tests/
            shared/build/test-results/
                androidApp/build/reports/tests/
                androidApp/build/test-results/

      - name: Publish Shared Module Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'shared/build/test-results/testAndroidHostTest/TEST-*.xml'
          check_name: 'Shared Module Test Results'
          fail_on_failure: true

      - name: Publish Android App Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
            report_paths: 'androidApp/build/test-results/testDebugUnitTest/TEST-*.xml'
            check_name: 'Android App Unit Test Results'
          fail_on_failure: true

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug -Pskip.supabase.check=true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

  ios-target-tests-compile:
    name: iOS Test Target Compile
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-konan-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-konan-

      - name: Compile iOS main and test targets
        run: ./gradlew :shared:compileKotlinIosArm64 :shared:compileTestKotlinIosArm64 -Pskip.supabase.check=true

  ios-schema-check:
    name: iOS Schema Sync Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate iOS schema matches SQLDelight
        run: |
          chmod +x .github/scripts/validate-ios-schema.sh
          ./.github/scripts/validate-ios-schema.sh

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Android lint
        run: ./gradlew :androidApp:lintDebug -Pskip.supabase.check=true

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: androidApp/build/reports/lint-results-*.html

  instrumented-tests:
      name: Instrumented Tests
      runs-on: ubuntu-latest
      timeout-minutes: 45
      needs: unit-tests
      if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

      steps:
          - name: Checkout repository
            uses: actions/checkout@v6

          - name: Set up Java 17
            uses: actions/setup-java@v4
            with:
                distribution: 'zulu'
                java-version: '17'

          - name: Setup Gradle
            uses: gradle/actions/setup-gradle@v4

          - name: Cache Gradle packages
            uses: actions/cache@v4
            with:
                path: |
                    ~/.gradle/caches
                    ~/.gradle/wrapper
                key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                restore-keys: |
                    ${{ runner.os }}-gradle-

          - name: Enable KVM
            run: |
                echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                sudo udevadm control --reload-rules
                sudo udevadm trigger --name-match=kvm

          - name: Run instrumented tests
            uses: reactivecircus/android-emulator-runner@v2
            with:
                api-level: 30
                arch: x86_64
                profile: Nexus 6
                heap-size: 512M
                ram-size: 4096M
                emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
                disable-animations: true
                script: ./gradlew :androidApp:connectedDebugAndroidTest -Pskip.supabase.check=true

          - name: Upload instrumented test results
            if: always()
            uses: actions/upload-artifact@v4
            with:
                name: instrumented-test-results
                path: androidApp/build/reports/androidTests/
                retention-days: 7
